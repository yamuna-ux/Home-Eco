<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Verify OTP | HomeEco</title>
    

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, .7), rgba(0, 0, 0, .7)),
                url("https://images.unsplash.com/photo-1509395176047-4a66953fd231");
            background-size: cover;
            color: #fff;
            padding: 18px;
        }

        .card {
            width: 420px;
            background: rgba(0, 0, 0, .75);
            border-radius: 18px;
            padding: 28px;
            text-align: center;
        }

        h2 {
            color: #2ecc71;
        }

        .otp {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 16px 0;
        }

        .otp input {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            border: 1px solid #555;
            background: #111;
            color: #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            cursor: pointer;
        }

        #msg {
            margin-top: 10px;
            min-height: 18px;
        }

        #resendBtn {
            margin-top: 10px;
            font-size: 13px;
            background: none;
            border: none;
            color: #aaa;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Verify OTP</h2>
        <p>Enter the 6-digit OTP sent to your email</p>
<div class="otp">
    <input maxlength="1" inputmode="numeric" aria-label="OTP digit 1">
    <input maxlength="1" inputmode="numeric" aria-label="OTP digit 2">
    <input maxlength="1" inputmode="numeric" aria-label="OTP digit 3">
    <input maxlength="1" inputmode="numeric" aria-label="OTP digit 4">
    <input maxlength="1" inputmode="numeric" aria-label="OTP digit 5">
    <input maxlength="1" inputmode="numeric" aria-label="OTP digit 6">
</div>
<input type="hidden" id="otp">
<div style="margin-top:12px;">
    <a href="login.html" style="color:#2ecc71; font-weight:700; text-decoration:none;">
        ← Back to Login
    </a>
</div>


    <button onclick="verifyOTP()">Verify OTP</button>
    <p id="msg"></p>

        <div id="resend" style="margin-top:10px; font-size:13px; color:#aaa;">
            Resend OTP in <span id="timer">30</span>s
        </div>


    <!-- ✅ USE SHARED LOGIC -->
    <script src="auth.js"></script>
<script>
    const inputs = document.querySelectorAll(".otp input");
    inputs[0].focus();

    inputs.forEach((inp, i) => {
        inp.addEventListener("input", () => {
            inp.value = inp.value.replace(/[^0-9]/g, "");
            if (inp.value && i < inputs.length - 1) {
                inputs[i + 1].focus();
            }
        });
    });

    async function verifyOTP() {
        const otp = [...inputs].map(i => i.value).join("");
        const email = localStorage.getItem("resetEmail");
        const msg = document.getElementById("msg");

        if (otp.length !== 6) {
            msg.textContent = "Enter 6-digit OTP";
            msg.style.color = "red";
            return;
        }

        const res = await fetch("http://localhost:8081/api/auth/verify-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp })
        });

        const text = await res.text();

        if (res.ok) {
            msg.style.color = "lightgreen";
            msg.textContent = "OTP verified successfully";
            setTimeout(() => {
                window.location.href = "reset-password.html";
            }, 1200);
        } else {
            msg.style.color = "red";
            msg.textContent = text;
        }
    }
</script>



</body>

</html>
