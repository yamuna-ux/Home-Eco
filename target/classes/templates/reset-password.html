<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password | HomeEco</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --green: #2ecc71;
            --green-dark: #27ae60;
            --gold: #c7a14a;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* 🌿 BACKGROUND IMAGE */
            background:
                linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)),
                url("https://images.unsplash.com/photo-1509395176047-4a66953fd231?auto=format&fit=crop&w=1600&q=80");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ecfdf3;
            overflow: hidden;
        }

        /* floating animation */
        @keyframes floatCard {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .card {
            width: 420px;
            padding: 36px 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            text-align: center;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.65);
            animation: floatCard 4s ease-in-out infinite;
        }

        h2 {
            margin-bottom: 6px;
            font-size: 26px;
            letter-spacing: 0.6px;
            color: var(--green);
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 22px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
        }

        input:focus {
            border-color: rgba(46, 204, 113, 0.7);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.25);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 0.4px;
            cursor: pointer;
            color: #04140b;
            box-shadow: 0 12px 40px rgba(46, 204, 113, 0.45);
            transition: 0.25s;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
            box-shadow: 0 18px 55px rgba(46, 204, 113, 0.65);
        }

        #msg {
            margin-top: 14px;
            min-height: 18px;
            font-size: 14px;
        }

        .footer-link {
            margin-top: 18px;
            font-size: 13px;
        }

        .footer-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                width: 92%;
                padding: 28px 22px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Reset Password</h2>
        <div class="subtitle">Secure your HomeEco account</div>

        <input type="password" id="newPassword" placeholder="New password">
        <input type="password" id="confirmPassword" placeholder="Confirm password">

        <button onclick="handleReset()">Reset Password</button>

        <div id="msg"></div>

        <div class="footer-link">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <!-- shared auth logic -->
    <script src="auth.js"></script>

    <script>
        function handleReset() {
            const p1 = document.getElementById("newPassword").value;
            const p2 = document.getElementById("confirmPassword").value;
            const msg = document.getElementById("msg");

            if (!p1 || !p2) {
                msg.textContent = "All fields are required";
                msg.style.color = "red";
                return;
            }

            if (p1 !== p2) {
                msg.textContent = "Passwords do not match";
                msg.style.color = "red";
                return;
            }

            // backend call
            resetPasswordAPI(p1);
        }
    </script>

</body>

</html>
