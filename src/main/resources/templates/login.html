<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | HomeEco</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(rgba(0, 0, 0, .65), rgba(0, 0, 0, .65)),
                url("https://images.unsplash.com/photo-1509395176047-4a66953fd231?auto=format&fit=crop&w=1400&q=80");
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            padding: 20px;
        }

        .login-box {
            width: 420px;
            background: rgba(0, 0, 0, .75);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
        }

        .logo {
            text-align: center;
            font-size: 30px;
            font-weight: 900;
            color: #2ecc71;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, .75);
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin: 15px 0 8px;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .08);
            color: #fff;
            outline: none;
        }

        input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, .15);
        }

        .forgot {
            text-align: right;
            margin-top: 8px;
            font-size: 13px;
        }

        .forgot a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 13px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 900;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #052014;
        }

        .msg {
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
        }

        .links {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .links a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div class="logo">HomeEco</div>
        <div class="subtitle">Secure login to your dashboard</div>

        <label>Email</label>
        <input type="email" id="email" placeholder="example@gmail.com">

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">

        <div class="forgot">
            <a href="forgot-password.html">Forgot Password?</a>
        </div>

        <button class="btn" onclick="login()">Login</button>

        <p class="msg" id="msg"></p>

        <div class="links">
            New user? <a href="register.html">Create Account</a>
        </div>
    </div>

    <script>
       const API = "http://localhost:8081/api/auth/login";


        async function login() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const msg = document.getElementById("msg");

            msg.textContent = "";

            if (!email || !password) {
                msg.style.color = "#ff7675";
                msg.textContent = "All fields are required";
                return;
            }

            try {
                const res = await fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const text = await res.text();

                if (res.ok) {
                    msg.style.color = "#2ecc71";
                    msg.textContent = "Login successful";
                    setTimeout(() => window.location.href = "dashboard.html", 800);
                } else {
                    msg.style.color = "#ff7675";
                    msg.textContent = text;
                }
            } catch {
                msg.style.color = "#ff7675";
                msg.textContent = "Server not running";
            }
        }
    </script>

</body>

</html>
