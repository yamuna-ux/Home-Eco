<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password | HomeEco</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, .7), rgba(0, 0, 0, .7)),
                url("https://images.unsplash.com/photo-1509395176047-4a66953fd231");
            background-size: cover;
            font-family: "Segoe UI", sans-serif;
            color: #fff;
        }

        .card {
            width: 420px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(0, 0, 0, .8);
            text-align: center;
        }

        h2 {
            color: #2ecc71;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #555;
            background: #111;
            color: #fff;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 13px;
            border: none;
            border-radius: 14px;
            font-weight: 900;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            cursor: pointer;
        }

        #msg {
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Forgot Password</h2>
        <p>Enter registered email to receive OTP</p>

        <input type="email" id="email" placeholder="Registered email">
        <!-- ✅ FIXED function name -->
        <button onclick="sendOtp()">Submit</button>

        <p id="msg"></p>
    </div>

<script>
    function sendOtp() {
        alert("Button clicked ✅");

        const email = document.getElementById("email").value.trim();
        console.log("Email:", email);

        if (!email) {
            alert("Email required");
            return;
        }

        fetch("http://localhost:8081/api/auth/send-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        })
            .then(res => res.text())
            .then(data => {
                alert("Server response: " + data);
                localStorage.setItem("resetEmail", email);
                window.location.href = "forgot-otp.html";
            })
            .catch(err => {
                alert("ERROR: " + err);
            });
    }
</script>


</body>

</html>
